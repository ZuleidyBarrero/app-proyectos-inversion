<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuevo proyecto</title>
</head>
<body>
    <h1>Formulario de proyecto</h1>

    <form>
        <div>
            <label for="nombre">Nombre del proyecto</label><br>
            <input type="text" id="nombre" name="nombre">
        </div>
        <br>

        <div>
            <label for="sector">Sector</label><br>
            <input type="text" id="sector" name="sector">
        </div>
        <br>

        <div>
            <label for="problema">Problema</label><br>
            <textarea id="problema" name="problema"></textarea>
        </div>
        <br>

        <div>
            <label for="objetivo_general">Objetivo general</label><br>
            <textarea id="objetivo_general" name="objetivo_general"></textarea>
        </div>
        <br>

        <div>
            <label for="poblacion_objetivo">Población objetivo</label><br>
            <input type="text" id="poblacion_objetivo" name="poblacion_objetivo">
        </div>
        <br>

        <div>
            <label for="presupuesto">Presupuesto</label><br>
            <input type="number" id="presupuesto" name="presupuesto">
        </div>
        <br>

        <div>
            <label for="observaciones">Observaciones</label><br>
            <textarea id="observaciones" name="observaciones"></textarea>
        </div>
        <br>

        <button type="submit">Guardar proyecto</button>
    </form>
</body>
</html>
