<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Listado de proyectos</title>
</head>
<body>
    <h1>Listado de proyectos</h1>

    <p><a href="/projects/new/">Crear nuevo proyecto</a></p>

    {% if projects %}
        <ul>
            {% for project in projects %}
                <li>
                    <a href="/projects/{{ project.id }}/">{{ project.nombre }}</a>
                    - {{ project.sector }} - {{ project.estado }}
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No hay proyectos registrados.</p>
    {% endif %}
</body>
</html>
